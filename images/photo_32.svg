            <line x1="120" y1="150" x2="280" y2="150" stroke="#f6bd8e" stroke-width="2" stroke-dasharray="5,5" />
            <line x1="120" y1="250" x2="280" y2="250" stroke="#f6bd8e" stroke-width="2" stroke-dasharray="5,5" />
        
  
  <!-- Labels -->
