<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #fefae8; }
      .title { font-family: 'Cormorant Garamond', 'Playfair Display', serif; font-size: 26px; fill: #2c351e; font-weight: 600; text-anchor: middle; }
      .subtitle { font-family: 'Montserrat', 'Inter', sans-serif; font-size: 11px; fill: #8ca653; letter-spacing: 1px; text-anchor: middle; text-transform: uppercase; }
      .helper { font-family: sans-serif; font-size: 9px; fill: #a2a89b; text-anchor: middle; }
    </style>
  </defs>
  
  <rect width="400" height="400" class="bg" />
  
  <!-- Graphic Pattern -->
  
            <!-- Grid lines representing cartography -->
            <path d="M50 100 L350 100 M50 200 L350 200 M50 300 L350 300 M100 50 L100 350 M200 50 L200 350 M300 50 L300 350" stroke="#8ca653" stroke-width="1" opacity="0.15" />
            <!-- Thread/curves representing couture -->
            <path d="M80 320 C 150 100, 250 350, 320 80" fill="none" stroke="#f6bd8e" stroke-width="5" stroke-linecap="round" />
            <circle cx="320" cy="80" r="12" fill="#8ca653" />
        
  
  <!-- Labels -->
  <text x="200" y="325" class="title">L'Histoire de Florence</text>
  <text x="200" y="350" class="subtitle">De la géomatique au vêtement flou</text>
