<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ca653" />
      <stop offset="100%" stop-color="#f6bd8e" />
    </linearGradient>
    <style>
      .text-title {
        font-family: 'Cormorant Garamond', 'Playfair Display', 'Georgia', serif;
        font-size: 32px;
        fill: #2c351e;
        letter-spacing: 2px;
        font-weight: 600;
      }
      .text-subtitle {
        font-family: 'Montserrat', 'Inter', sans-serif;
        font-size: 10px;
        fill: #8ca653;
        letter-spacing: 4px;
        font-weight: 500;
        text-transform: uppercase;
      }
      .logo-circle {
        fill: url(#brand-grad);
      }
      .logo-letter {
        font-family: 'Cormorant Garamond', 'Playfair Display', serif;
        font-size: 38px;
        fill: #fefae8;
        font-weight: bold;
      }
    </style>
  </defs>
  
  <!-- Icon Mark -->
  <circle cx="50" cy="50" r="35" class="logo-circle" />
  <text x="50" y="62" text-anchor="middle" class="logo-letter">N</text>
  
  <!-- Text Mark -->
  <text x="105" y="48" class="text-title">La Juste Nuance</text>
  <text x="107" y="68" class="text-subtitle">Accompagnement en image de soi</text>
</svg>
